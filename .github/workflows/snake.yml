name: Generate snake animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: LucasSantos9711
          outputs: |
            output/github-snake.svg
            output/github-snake.png

      - name: Deploy snake to output branch
        uses: JamesIves/github-pages-deploy-action@v4.4.1
        with:
          branch: output
          folder: output
          token: ${{ secrets.GITHUB_TOKEN }}
