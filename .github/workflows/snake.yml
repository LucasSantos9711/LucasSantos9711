name: Generate snake animation


on:

  schedule:

    - cron: "0 0 * * *"

  workflow_dispatch:


permissions:

  contents: write


jobs:

  generate:

    runs-on: ubuntu-latest

    timeout-minutes: 5


    steps:

      - name: Checkout repo

        uses: actions/checkout@v4


      - name: Generate snake SVG

        uses: Platane/snk@v3

        with:

          github_user_name: LucasSantos9711

          github_token: ${{ secrets.GITHUB_TOKEN }}

          outputs: output/github-snake.svg


      - name: Verify snake file was created

        run: |

          echo "=== Files generated ==="

          ls -la output/

          echo ""

          echo "=== File size check ==="

          if [ -f output/github-snake.svg ]; then

            echo "✅ SVG file exists! Size: $(stat -c%s output/github-snake.svg) bytes"

          else

            echo "❌ SVG file was NOT created"

            exit 1

          fi


      - name: Push snake to output branch

        uses: ad-m/github-push-action@v0.6.0

        with:

          github_token: ${{ secrets.GITHUB_TOKEN }}

          branch: output

          directory: output

          force: true
