name: Generate snake animation


on:

  schedule:

    - cron: "0 0 * * *"

  workflow_dispatch:


permissions:

  contents: write


jobs:

  generate:

    runs-on: ubuntu-latest

    timeout-minutes: 5


    steps:

      - name: Checkout repo

        uses: actions/checkout@v4


      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.11"


      - name: Generate snake SVG

        run: python scripts/generate_snake.py


      - name: Verify SVG was created

        run: |

          if [ -f output/github-snake.svg ]; then

            echo "✅ SVG exists, size: $(stat -c%s output/github-snake.svg) bytes"

            head -c 200 output/github-snake.svg

          else

            echo "❌ SVG missing"

            exit 1

          fi


      - name: Push snake to output branch

        uses: ad-m/github-push-action@v0.6.0

        with:

          github_token: ${{ secrets.GITHUB_TOKEN }}

          branch: output

          directory: output

          force: true
